<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Generator</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="password-generator">
        <div>
            <h1 id="headingOne">Generate a</h1>
            <h1 id="headingTwo">random password</h1>
            <h3 id="tagline">Never use an insecure password again</h3>
        </div>
       <div id="controls">
        <h1 id="random-password"></h1>
        <button id="generate-password-btn">Generate password</button>
            <div id="option-btns">
                <label><input type="checkbox"> Include capital letters?</label>
                <label><input type="checkbox"> Include numbers?</label>
                <label><input type="checkbox"> Include special characters?</label>
             </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
